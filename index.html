<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixelBead Workbench</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: '#f8f9ff',
            surface: '#f8f9ff',
            'surface-dim': '#cbdbf5',
            'surface-container-lowest': '#ffffff',
            'surface-container-low': '#eff4ff',
            'surface-container': '#e5eeff',
            'surface-container-high': '#dce9ff',
            'surface-container-highest': '#d3e4fe',
            primary: '#3525cd',
            'primary-container': '#4f46e5',
            'primary-fixed-dim': '#c3c0ff',
            secondary: '#565e74',
            outline: '#777587',
            'outline-variant': '#c7c4d8',
            'on-surface': '#0b1c30',
            'on-surface-variant': '#464555',
            'on-primary': '#ffffff',
            'on-primary-container': '#dad7ff',
          },
          spacing: {
            'margin-desktop': '32px',
            'margin-mobile': '16px',
            'panel-width': '320px',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
          fontSize: {
            'label-sm': ['13px', { lineHeight: '1', letterSpacing: '0.05em', fontWeight: '500' }],
            'title-md': ['18px', { lineHeight: '1.4', fontWeight: '600' }],
            'display-lg': ['48px', { lineHeight: '1.1', letterSpacing: '-0.02em', fontWeight: '700' }],
          },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="h-full bg-background text-on-surface font-sans antialiased overflow-hidden">
  <header class="h-16 px-8 bg-surface border-b border-outline-variant flex items-center justify-between relative z-50">
    <div class="flex items-center gap-8 min-w-0">
      <div class="flex items-baseline gap-3 min-w-0">
        <span class="text-[30px] md:text-[36px] leading-none font-extrabold tracking-[-0.04em] text-primary">PixelBead</span>
        <span class="hidden sm:inline text-xs font-semibold uppercase tracking-[0.2em] text-secondary">Workbench</span>
      </div>
      <nav class="hidden lg:flex items-center gap-6 text-sm text-secondary">
        <span class="hover:text-primary transition-colors cursor-default">Gallery</span>
        <span class="hover:text-primary transition-colors cursor-default">Tutorial</span>
        <span class="hover:text-primary transition-colors cursor-default">About</span>
      </nav>
    </div>

    <div class="flex items-center gap-4 shrink-0">
      <span id="statusMessage" class="hidden max-w-[360px] truncate rounded-full bg-surface-container-high px-3 py-1 text-xs font-semibold text-primary"></span>
      <div class="hidden sm:flex flex-col items-end">
        <span class="text-title-md font-semibold text-on-surface">拼豆图纸</span>
        <span class="text-[11px] uppercase tracking-widest text-secondary">Image to Bead</span>
      </div>
      <label class="flex items-center gap-2 text-sm text-secondary">
        色号系统
        <select id="colorSystemSelect" class="rounded-lg border-outline-variant bg-surface-container-lowest px-3 py-2 text-sm text-on-surface focus:border-primary focus:ring-primary">
          <option value="MARD">MARD</option>
          <option value="COCO">COCO</option>
          <option value="漫漫">漫漫</option>
          <option value="盼盼">盼盼</option>
          <option value="咪小窝">咪小窝</option>
        </select>
      </label>
    </div>
  </header>

  <div class="flex h-[calc(100vh-64px)] min-w-0 overflow-hidden">
    <aside id="toolRail" class="fixed left-6 top-24 bottom-8 z-40 hidden w-20 flex-col gap-4 xl:flex">
      <div class="rounded-2xl border border-outline-variant bg-surface shadow-sm flex flex-col items-center gap-4 py-4">
        <button class="active-tool flex h-12 w-12 items-center justify-center rounded-xl bg-primary text-on-primary" title="画笔" type="button">
          <span class="material-symbols-outlined">brush</span>
        </button>
        <button class="flex h-12 w-12 items-center justify-center rounded-xl text-secondary transition-colors hover:bg-surface-container-high" title="橡皮" type="button">
          <span class="material-symbols-outlined">ink_eraser</span>
        </button>
        <button class="flex h-12 w-12 items-center justify-center rounded-xl text-secondary transition-colors hover:bg-surface-container-high" title="填充" type="button">
          <span class="material-symbols-outlined">format_color_fill</span>
        </button>
        <div class="h-px w-8 bg-outline-variant"></div>
        <button class="flex h-12 w-12 items-center justify-center rounded-xl text-secondary transition-colors hover:bg-surface-container-high" title="吸管" type="button">
          <span class="material-symbols-outlined">colorize</span>
        </button>
        <button class="flex h-12 w-12 items-center justify-center rounded-xl text-secondary transition-colors hover:bg-surface-container-high" title="移动" type="button">
          <span class="material-symbols-outlined">pan_tool</span>
        </button>
      </div>

      <div class="custom-scrollbar flex-1 overflow-y-auto rounded-2xl border border-outline-variant bg-surface py-4 shadow-sm flex flex-col items-center gap-3">
        <span class="text-[10px] font-bold text-outline">COLORS</span>
        <span class="h-8 w-8 rounded-full bg-[#f5a8c8] ring-2 ring-primary ring-offset-2" title="Pink"></span>
        <span class="h-8 w-8 rounded-full bg-[#7a4a78]" title="Mauve"></span>
        <span class="h-8 w-8 rounded-full bg-[#111827]" title="Black"></span>
        <span class="h-8 w-8 rounded-full bg-[#4b5563]" title="Grey"></span>
        <span class="h-8 w-8 rounded-full bg-[#8b5cf6]" title="Purple"></span>
        <span class="h-8 w-8 rounded-full border border-outline-variant bg-white" title="White"></span>
        <span class="h-8 w-8 rounded-full bg-[#ffd0bf]" title="Skin"></span>
        <span class="material-symbols-outlined flex h-8 w-8 items-center justify-center rounded-full text-[20px] text-secondary">add</span>
      </div>
    </aside>

    <main class="flex min-w-0 flex-1 overflow-hidden">
      <section id="centerPanel" class="relative flex min-w-0 flex-1 items-center justify-center overflow-auto bg-surface-dim p-6 xl:pl-32">
        <div id="previewEmpty" class="flex max-w-lg flex-col items-center gap-5 rounded-3xl border border-white/70 bg-surface/70 px-10 py-12 text-center shadow-xl backdrop-blur">
          <div class="flex h-20 w-20 items-center justify-center rounded-2xl bg-surface-container-lowest text-primary shadow-sm">
            <span class="material-symbols-outlined text-[44px]">image</span>
          </div>
          <div>
            <h2 class="text-2xl font-bold tracking-tight text-on-surface">上传图片后开始生成</h2>
            <p class="mt-2 text-sm leading-6 text-secondary">在右侧上传图片，选择网格和色号系统，然后生成可导出的拼豆图纸。</p>
          </div>
        </div>

        <div id="previewArea" class="hidden flex h-full w-full min-w-0 flex-col gap-4">
          <div class="mx-auto flex flex-wrap items-center justify-center gap-2 rounded-2xl border border-outline-variant bg-surface p-2 shadow-sm">
            <button id="viewColor" class="rounded-xl bg-primary px-4 py-2 text-xs font-bold uppercase tracking-wider text-on-primary transition" type="button">彩色</button>
            <button id="viewCode" class="rounded-xl border border-outline-variant bg-surface-container-lowest px-4 py-2 text-xs font-bold uppercase tracking-wider text-secondary transition hover:bg-surface-container-high" type="button">编号</button>
            <span class="mx-1 h-6 w-px bg-outline-variant"></span>
            <button id="zoomOutBtn" class="flex h-9 w-9 items-center justify-center rounded-xl text-secondary transition hover:bg-surface-container-high" title="缩小" type="button">
              <span class="material-symbols-outlined text-[20px]">zoom_out</span>
            </button>
            <button id="zoomInBtn" class="flex h-9 w-9 items-center justify-center rounded-xl text-secondary transition hover:bg-surface-container-high" title="放大" type="button">
              <span class="material-symbols-outlined text-[20px]">zoom_in</span>
            </button>
          </div>

          <div class="flex min-h-0 flex-1 items-center justify-center overflow-auto">
            <div class="relative rounded-sm bg-white p-4 shadow-2xl">
              <div id="previewContainer" class="flex max-h-[calc(100vh-190px)] min-h-[360px] min-w-[360px] items-start justify-center overflow-auto rounded-sm border border-outline-variant bg-surface-container-lowest p-2">
                <canvas id="patternCanvas"></canvas>
              </div>
              <div class="absolute -bottom-9 left-0 flex gap-4 whitespace-nowrap text-[11px] font-semibold uppercase tracking-wider text-secondary">
                <span>Preview</span>
                <span>Board: 29×29</span>
                <span>PixelBead</span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <aside id="inspectorPanel" class="custom-scrollbar w-[320px] shrink-0 overflow-y-auto border-l border-outline-variant bg-surface">
        <div class="flex flex-col gap-7 p-6">
          <section>
            <div class="mb-4 flex items-center justify-between">
              <h3 class="text-title-md font-bold text-on-surface">Image to Bead</h3>
              <span class="material-symbols-outlined text-[20px] text-secondary">help_outline</span>
            </div>
            <div id="dropZone" class="group flex cursor-pointer flex-col items-center justify-center gap-3 rounded-xl border-2 border-dashed border-outline-variant bg-surface-container-lowest p-7 text-center transition-colors hover:bg-surface-container">
              <span class="material-symbols-outlined text-[34px] text-primary transition-transform group-hover:scale-110">cloud_upload</span>
              <div>
                <p class="text-label-sm font-semibold text-secondary">拖拽、点击或粘贴图片</p>
                <p class="mt-1 text-[11px] text-secondary/70">JPG · PNG · WEBP</p>
              </div>
              <button id="fileBtn" class="rounded-lg border border-outline-variant bg-surface px-4 py-2 text-xs font-bold text-primary transition hover:bg-surface-container-high" type="button">选择文件</button>
            </div>
            <input type="file" id="fileInput" accept="image/*" class="absolute h-0 w-0 opacity-0 pointer-events-none">
          </section>

          <section class="flex flex-col gap-6">
            <div>
              <label class="mb-3 block text-label-sm font-bold text-on-surface-variant">网格尺寸</label>
              <div class="mb-3 flex items-center gap-2">
                <input id="gridW" class="w-full rounded-lg border-outline-variant bg-surface-container-lowest p-2 text-center text-sm focus:border-primary focus:ring-primary" type="number" value="58" min="10" max="500">
                <span class="text-secondary">×</span>
                <input id="gridH" class="w-full rounded-lg border-outline-variant bg-surface-container-lowest p-2 text-center text-sm focus:border-primary focus:ring-primary" type="number" value="58" min="10" max="500">
              </div>
              <div data-testid="size-presets" class="flex flex-wrap gap-2">
                <button data-w="29" data-h="29" class="rounded border border-outline-variant px-3 py-1 text-[11px] text-secondary transition hover:bg-surface-container-high" type="button">29×29</button>
                <button data-w="58" data-h="58" class="rounded bg-primary-container px-3 py-1 text-[11px] text-on-primary-container" type="button">58×58</button>
                <button data-w="87" data-h="87" class="rounded border border-outline-variant px-3 py-1 text-[11px] text-secondary transition hover:bg-surface-container-high" type="button">87×87</button>
                <button data-w="116" data-h="116" class="rounded border border-outline-variant px-3 py-1 text-[11px] text-secondary transition hover:bg-surface-container-high" type="button">116×116</button>
              </div>
            </div>

            <div>
              <label class="mb-3 block text-label-sm font-bold text-on-surface-variant">长宽比</label>
              <select id="aspectMode" class="w-full rounded-lg border-outline-variant bg-surface-container-lowest p-3 text-sm font-medium focus:border-primary focus:ring-primary">
                <option value="fit">留白居中</option>
                <option value="fill">拉伸填充</option>
                <option value="crop">裁剪适配</option>
              </select>
            </div>

            <div>
              <label class="mb-3 block text-label-sm font-bold text-on-surface-variant">图像类型</label>
              <select id="samplingMode" class="w-full rounded-lg border-outline-variant bg-surface-container-lowest p-3 text-sm font-medium focus:border-primary focus:ring-primary">
                <option value="dominant">卡通 / 动漫：主导色</option>
                <option value="average">照片：平均色</option>
                <option value="lineart" selected>线稿插画：保护轮廓</option>
              </select>
            </div>

            <div class="flex flex-col gap-3">
              <label class="flex cursor-pointer items-center gap-3 text-sm text-on-surface-variant">
                <input id="skipTransparent" checked class="rounded border-outline-variant text-primary focus:ring-primary" type="checkbox">
                <span>透明区域自动跳过</span>
              </label>
              <label class="flex cursor-pointer items-center gap-3 text-sm text-on-surface-variant">
                <input id="enableSkipColor" class="rounded border-outline-variant text-primary focus:ring-primary" type="checkbox">
                <span>指定跳过色</span>
                <input type="color" id="skipColorPicker" value="#ffffff" disabled class="ml-auto h-7 w-7 cursor-pointer rounded border border-outline-variant bg-white p-0.5">
                <span id="skipColorHex" class="w-[54px] text-[11px] text-secondary">#ffffff</span>
              </label>
            </div>

            <div>
              <div class="mb-2 flex justify-between">
                <label class="text-label-sm font-bold text-on-surface-variant">保真度</label>
                <span id="fidelityLabel" class="text-[11px] text-secondary">平衡</span>
              </div>
              <input id="fidelity" class="h-1 w-full cursor-pointer appearance-none rounded-lg bg-surface-container-highest accent-primary" type="range" min="3" max="100" value="60">
              <div class="mt-1 flex justify-between">
                <span class="text-[10px] text-outline">省钱</span>
                <span class="text-[10px] text-outline">还原</span>
              </div>
            </div>

            <button id="generateBtn" disabled class="flex w-full items-center justify-center gap-2 rounded-xl bg-primary py-4 text-label-sm font-bold text-on-primary shadow-md transition-all hover:shadow-lg active:scale-95 disabled:bg-outline-variant disabled:text-secondary disabled:shadow-none" type="button">
              <span class="material-symbols-outlined">play_arrow</span>
              生成图纸
            </button>
          </section>

          <div class="h-px bg-outline-variant"></div>

          <section id="countsSection" class="hidden">
            <div class="mb-4 flex items-center justify-between">
              <h3 class="text-title-md font-bold text-on-surface">豆子清单</h3>
              <span id="colorStats" class="text-[11px] font-semibold uppercase tracking-wider text-secondary"></span>
            </div>
            <ul id="countsList" class="custom-scrollbar max-h-[260px] space-y-1 overflow-y-auto pr-1"></ul>
          </section>

          <section id="exportSection" class="hidden">
            <h3 class="mb-4 text-title-md font-bold text-on-surface">Workspace</h3>
            <div class="grid grid-cols-2 gap-3">
              <button id="downloadPNGBtn" class="flex items-center justify-center gap-2 rounded-lg border border-outline-variant py-3 text-label-sm font-semibold transition-colors hover:bg-surface-container-low" type="button">
                <span class="material-symbols-outlined text-[18px]">image</span> PNG
              </button>
              <button id="downloadCSVBtn" class="flex items-center justify-center gap-2 rounded-lg border border-outline-variant py-3 text-label-sm font-semibold transition-colors hover:bg-surface-container-low" type="button">
                <span class="material-symbols-outlined text-[18px]">table</span> CSV
              </button>
            </div>
            <button id="printBtn" class="mt-3 flex w-full items-center justify-center gap-2 rounded-xl bg-surface-container-highest py-4 text-label-sm font-bold text-on-surface transition-colors hover:bg-outline-variant" type="button">
              <span class="material-symbols-outlined">print</span> 打印图纸
            </button>
            <div class="mt-4 grid grid-cols-2 gap-3">
              <button id="removeBackgroundBtn" class="rounded-lg border border-outline-variant py-3 text-label-sm font-semibold transition-colors hover:bg-surface-container-low" type="button">一键去背景</button>
              <button id="undoGridActionBtn" disabled class="rounded-lg border border-outline-variant py-3 text-label-sm font-semibold text-secondary transition-colors hover:bg-surface-container-low disabled:opacity-50" type="button">撤销</button>
            </div>
            <div id="excludedColorsPanel" class="mt-3 hidden rounded-lg border border-outline-variant bg-surface-container-lowest p-3">
              <div class="mb-2 text-[11px] font-bold text-on-surface-variant">已排除颜色</div>
              <ul id="excludedColorsList" class="space-y-1 text-xs text-secondary"></ul>
            </div>
            <div class="mt-4 rounded-xl border border-outline-variant bg-surface-container-lowest p-3">
              <div class="mb-2 flex items-center justify-between">
                <span class="text-label-sm font-bold text-on-surface-variant">手动精修</span>
                <span id="selectedEditColorLabel" class="text-[11px] text-secondary">点击清单选择颜色</span>
              </div>
              <div class="grid grid-cols-4 gap-2">
                <button id="paintModeBtn" class="rounded-lg border border-outline-variant py-2 text-xs font-semibold transition-colors" type="button">上色</button>
                <button id="eraseModeBtn" class="rounded-lg border border-outline-variant py-2 text-xs font-semibold transition-colors" type="button">擦除</button>
                <button id="floodEraseModeBtn" class="rounded-lg border border-outline-variant py-2 text-xs font-semibold transition-colors" type="button">区域擦除</button>
                <button id="replaceColorBtn" class="rounded-lg border border-outline-variant py-2 text-xs font-semibold transition-colors" type="button">替换颜色</button>
              </div>
            </div>
          </section>
        </div>
      </aside>
    </main>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
